<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>HR Portal - Register</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="brand">HR PORTAL</div>
      <h1>Create Account</h1>
      <p>Register to access the HR Portal.</p>
      <form class="login-form" action="register-handler.php" method="post" style="max-height: 70vh; overflow-y: auto; padding-right: 8px;">
        <label for="surname">Surname</label>
        <input id="surname" name="surname" type="text" placeholder="Doe" required />
        
        <label for="firstname">First Name</label>
        <input id="firstname" name="firstname" type="text" placeholder="John" required />
        
        <label for="middle_initial">Middle Initial (Optional)</label>
        <input id="middle_initial" name="middle_initial" type="text" placeholder="M" maxlength="1" />
        
        <label>Email (Auto-generated)</label>
        <div id="autoEmail" style="width: 100%; border: 1px solid #d1d5db; border-radius: 8px; padding: 10px; font-size: 0.95rem; background: #f9fafb; color: #6b7280;">-</div>
        
        <label for="position">Position</label>
        <select id="position" name="position" required style="width: 100%; border: 1px solid #d1d5db; border-radius: 8px; padding: 10px; font-size: 0.95rem;">
          <option value="VPAA">VPAA</option>
          <option value="Dean">Dean</option>
          <option value="Program Chair">Program Chair</option>
          <option value="Faculty Members">Faculty Members </option>
          <option value="Administrative Staff">Administrative Staff</option>
        </select>
        
        <label for="department">Department</label>
        <select id="department" name="department" required style="width: 100%; border: 1px solid #d1d5db; border-radius: 8px; padding: 10px; font-size: 0.95rem;">
          <option value="BSIT">BSIT</option>
          <option value="BMMA">BMMA</option>
          <option value="BACCOM">BACCOM</option>
        </select>

        <label for="birthday">Birthday</label>
        <input id="birthday" name="birthday" type="date" required />

        <label for="gender">Gender</label>
        <select id="gender" name="gender" required style="width: 100%; border: 1px solid #d1d5db; border-radius: 8px; padding: 10px; font-size: 0.95rem;">
          <option value="male">Male</option>
          <option value="female">Female</option>
        </select>

        <fieldset style="border: 1px solid #e5e7eb; padding: 12px; border-radius: 8px; margin: 12px 0; background: #f9fafb;">
          <legend style="font-weight: 600; padding: 0 8px; color: #374151; font-size: 0.9rem;">Leave Allocation (Days)</legend>
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
            <div>
              <label for="leave_vacation" style="font-size: 0.8rem; margin-bottom: 4px;">Vacation Leave</label>
              <input type="number" id="leave_vacation" name="leave_vacation" min="0" value="0" style="width: 100%; border: 1px solid #d1d5db; border-radius: 6px; padding: 8px; font-size: 0.9rem;" />
            </div>
            <div>
              <label for="leave_sick_leave" style="font-size: 0.8rem; margin-bottom: 4px;">Sick Leave</label>
              <input type="number" id="leave_sick_leave" name="leave_sick_leave" min="0" value="0" style="width: 100%; border: 1px solid #d1d5db; border-radius: 6px; padding: 8px; font-size: 0.9rem;" />
            </div>
            <div>
              <label for="leave_personal_leave" style="font-size: 0.8rem; margin-bottom: 4px;">Personal Leave</label>
              <input type="number" id="leave_personal_leave" name="leave_personal_leave" min="0" value="0" style="width: 100%; border: 1px solid #d1d5db; border-radius: 6px; padding: 8px; font-size: 0.9rem;" />
            </div>
            <div>
              <label for="leave_birthday_leave" style="font-size: 0.8rem; margin-bottom: 4px;">Birthday Leave</label>
            <div>
              <label for="leave_birthday_leave" style="font-size: 0.8rem; margin-bottom: 4px;">Birthday Leave</label>
              <input type="number" id="leave_birthday_leave" name="leave_birthday_leave" min="0" value="0" style="width: 100%; border: 1px solid #d1d5db; border-radius: 6px; padding: 8px; font-size: 0.9rem;" />
            </div>
            <div>
              <label for="leave_maternity_leave" style="font-size: 0.8rem; margin-bottom: 4px;">Maternity Leave</label>
              <input type="number" id="leave_maternity_leave" name="leave_maternity_leave" min="0" value="0" style="width: 100%; border: 1px solid #d1d5db; border-radius: 6px; padding: 8px; font-size: 0.9rem;" />
            </div>
            <div>
              <label for="leave_paternity_leave" style="font-size: 0.8rem; margin-bottom: 4px;">Paternity Leave</label>
              <input type="number" id="leave_paternity_leave" name="leave_paternity_leave" min="0" value="0" style="width: 100%; border: 1px solid #d1d5db; border-radius: 6px; padding: 8px; font-size: 0.9rem;" />
            </div>
            <div>
              <label for="leave_other" style="font-size: 0.8rem; margin-bottom: 4px;">Other Leave</label>
              <input type="number" id="leave_other" name="leave_other" min="0" value="0" style="width: 100%; border: 1px solid #d1d5db; border-radius: 6px; padding: 8px; font-size: 0.9rem;" />
            </div>
          </div>
        </fieldset>
        
        <label for="password">Password</label>
        <input id="password" name="password" type="password" placeholder="••••••••" required />
        
        <label for="confirm_password">Confirm Password</label>
        <input id="confirm_password" name="confirm_password" type="password" placeholder="••••••••" required />
        
        <button type="submit" style="margin-top: 16px; width: 100%;">Create Account</button>
      </form>
      <div class="login-footer">Already have an account? <a href="login.html">Sign in</a></div>
    </div>
  </div>
  <script>
    // Auto-generate email as user types
    function updateAutoEmail() {
      const surname = document.getElementById('surname').value.toLowerCase().trim();
      const firstname = document.getElementById('firstname').value.toLowerCase().trim();
      const emailDisplay = document.getElementById('autoEmail');
      
      if (firstname && surname) {
        emailDisplay.textContent = firstname + surname + '@sdca.edu.ph';
      } else {
        emailDisplay.textContent = '-';
      }
    }
    
    document.getElementById('surname').addEventListener('input', updateAutoEmail);
    document.getElementById('firstname').addEventListener('input', updateAutoEmail);
  </script>
</body>
</html>
